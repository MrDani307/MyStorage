<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Storage</title>
    <style>
        /* Стильный темный интерфейс для мобильного */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .app-card { 
            background: #1e1e1e; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
            border: 1px solid #333;
        }
        h2 { color: #00d4ff; margin-top: 0; }
        #status { font-size: 14px; color: #888; margin-bottom: 15px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #252525; 
            color: white; 
            box-sizing: border-box; 
            outline: none;
        }
        input:focus { border-color: #00d4ff; }

        button { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        .btn-google { background: #ea4335; color: white; }
        .btn-save { background: #00d4ff; color: #000; }
        .btn-import { background: #333; color: #00d4ff; border: 1px solid #00d4ff; }
        
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Cloud Saver</h2>
    <div id="status">Загрузка...</div>
    
    <button class="btn-google" id="loginBtn" style="display: none;">Войти через Google</button>
    
    <input type="text" id="textInput" placeholder="Введите текст для облака...">
    
    <button class="btn-save" id="saveBtn">💾 Сохранить</button>
    <button class="btn-import" id="importBtn">📥 Импорт (Загрузить)</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
  // Твой конфиг (уже проверенный)
  const firebaseConfig = {
    apiKey: "AIzaSyDhhcyOXdcHrz5KG3TZrrj6grwaeSxKHVk",
    authDomain: "mysotarage.firebaseapp.com",
    projectId: "mysotarage",
    storageBucket: "mysotarage.firebasestorage.app",
    messagingSenderId: "940605681719",
    appId: "1:940605681719:web:63dc21b0d11f30fdfacfb2",
    measurementId: "G-ZMEXJTBDB7",
    databaseURL: "https://mysotarage-default-rtdb.firebaseio.com"
  };

  // Инициализация
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  const provider = new firebase.auth.GoogleAuthProvider();

  const statusDiv = document.getElementById('status');
  const loginBtn = document.getElementById('loginBtn');
  const textInput = document.getElementById('textInput');

  // Проверка авторизации
  auth.onAuthStateChanged((user) => {
    if (user) {
      statusDiv.innerText = "Привет, " + user.displayName;
      loginBtn.style.display = "none";
    } else {
      statusDiv.innerText = "Нужно войти в аккаунт";
      loginBtn.style.display = "block";
    }
  });

  // Логика кнопки входа
  loginBtn.onclick = () => {
    auth.signInWithPopup(provider).catch(error => {
        alert("Ошибка входа: " + error.message);
    });
  };

  // СОХРАНЕНИЕ
  document.getElementById('saveBtn').onclick = () => {
    const user = auth.currentUser;
    if (!user) return alert("Сначала войдите в аккаунт!");
    
    const val = textInput.value;
    if (!val) return alert("Поле пустое!");

    // Сохраняем в путь users/ID_ПОЛЬЗОВАТЕЛЯ
    db.ref('users/' + user.uid).set({
      text: val,
      date: new Date().toLocaleString()
    })
    .then(() => alert("Успешно сохранено в облаке!"))
    .catch(err => alert("Ошибка базы: " + err.message));
  };

  // ИМПОРТ (ЗАГРУЗКА)
  document.getElementById('importBtn').onclick = () => {
    const user = auth.currentUser;
    if (!user) return alert("Сначала войдите в аккаунт!");

    db.ref('users/' + user.uid).once('value')
    .then((snapshot) => {
      if (snapshot.exists()) {
        textInput.value = snapshot.val().text;
        alert("Данные загружены!");
      } else {
        alert("В вашем облаке еще нет записей.");
      }
    })
    .catch(err => alert("Ошибка загрузки: " + err.message));
  };
</script>

</body>
</html>
