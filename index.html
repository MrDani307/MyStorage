<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Saver</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; }
        button { width: 95%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #00d4ff; color: black; }
        .btn-red { background: #ea4335; color: white; }
        #status { color: #888; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Cloud Saver</h2>
    <div id="status">Инициализация...</div>
    
    <button class="btn-red" id="loginBtn" style="display:none">Войти через Google</button>
    <input type="text" id="textInput" placeholder="Твой текст...">
    <button class="btn-blue" id="saveBtn">Сохранить</button>
    <button id="importBtn" style="background: #333; color: white;">Загрузить (Импорт)</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
  // Твой конфиг
  const firebaseConfig = {
    apiKey: "AIzaSyDhhcyOXdcHrz5KG3TZrrj6grwaeSxKHVk",
    authDomain: "mysotarage.firebaseapp.com",
    projectId: "mysotarage",
    storageBucket: "mysotarage.firebasestorage.app",
    messagingSenderId: "940605681719",
    appId: "1:940605681719:web:63dc21b0d11f30fdfacfb2",
    measurementId: "G-ZMEXJTBDB7"
  };

  // Инициализация (compat версия)
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();

  const statusDiv = document.getElementById('status');
  const loginBtn = document.getElementById('loginBtn');
  const textInput = document.getElementById('textInput');

  // Следим за входом
  auth.onAuthStateChanged((user) => {
    if (user) {
      statusDiv.innerText = "Аккаунт: " + user.displayName;
      loginBtn.style.display = "none";
    } else {
      statusDiv.innerText = "Нужно войти в систему";
      loginBtn.style.display = "block";
    }
  });

  // Логин
  loginBtn.onclick = () => {
    auth.signInWithPopup(provider).catch(err => alert("Ошибка: " + err.message));
  };

  // Сохранение
  document.getElementById('saveBtn').onclick = () => {
    const user = auth.currentUser;
    if (!user) return alert("Войди в аккаунт!");
    
    db.collection("users_data").doc(user.uid).set({
      text: textInput.value,
      time: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => alert("Сохранено!"));
  };

  // Загрузка
  document.getElementById('importBtn').onclick = () => {
    const user = auth.currentUser;
    if (!user) return alert("Войди в аккаунт!");

    db.collection("users_data").doc(user.uid).get().then((doc) => {
      if (doc.exists) {
        textInput.value = doc.data().text;
        alert("Данные получены!");
      } else {
        alert("В облаке пусто");
      }
    });
  };
</script>

</body>
</html>
