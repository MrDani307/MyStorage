            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);

        h2 { color: #00d4ff; margin-bottom: 5px; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #252525; 
            color: white; 
            box-sizing: border-box; 
            outline: none;
        }
        input:focus { border-color: #00d4ff; }

        button { 
            width: 100%; 
            padding: 12px;

            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        .btn-google { background: #ea4335; color: white; }
        .btn-save { background: #00d4ff; color: #000; }
        .btn-import { background: #333; color: #00d4ff; border: 1px solid #00d4ff; }
        
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
    </style>
</head>
